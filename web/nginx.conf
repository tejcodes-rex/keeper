# Nginx config template for serving the Mission Control SPA on Cloud Run.
# ${PORT} is substituted at container start (Cloud Run injects PORT, default 8080).

server {
    listen       ${PORT};
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Long-cache fingerprinted build assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Never cache the entry HTML so new deploys are picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SPA fallback: route everything else to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Lightweight health endpoint for Cloud Run probes.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;
    gzip_min_length 1024;
}
